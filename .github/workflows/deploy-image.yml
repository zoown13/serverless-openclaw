name: Build and Deploy Container Image

on:
  workflow_dispatch:
    inputs:
      skip-soci:
        description: "Skip SOCI index generation"
        required: false
        type: boolean
        default: false
      openclaw-version:
        description: "OpenClaw version (e.g. 2026.2.9, latest)"
        required: false
        type: string
        default: "latest"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-image-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: serverless-openclaw
  SOCI_VERSION: "0.12.1"

jobs:
  validate-release:
    name: Validate Release Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate release context
        env:
          OPENCLAW_VERSION: ${{ inputs.openclaw-version || 'latest' }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Container releases are only allowed from the main branch." >&2
            exit 1
          fi

          case "${OPENCLAW_VERSION}" in
            ""|*[!A-Za-z0-9._-]*)
              echo "openclaw-version may only contain letters, numbers, dots, underscores, and dashes." >&2
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Run release preflight
        run: npm run release:check

  build-and-push:
    name: Build, Push, and Index
    needs: [validate-release]
    runs-on: ubuntu-latest
    environment:
      name: image-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ARM64 image (zstd compression)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/container/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          build-args: |
            OPENCLAW_VERSION=${{ inputs.openclaw-version || 'latest' }}
          provenance: false
          outputs: type=image,compression=zstd,compression-level=3,force-compression=true

      - name: Install SOCI CLI
        if: ${{ !inputs.skip-soci }}
        run: |
          wget -q "https://github.com/awslabs/soci-snapshotter/releases/download/v${SOCI_VERSION}/soci-snapshotter-${SOCI_VERSION}-linux-amd64.tar.gz"
          sudo tar -xzf "soci-snapshotter-${SOCI_VERSION}-linux-amd64.tar.gz" -C /usr/local/bin soci
          rm "soci-snapshotter-${SOCI_VERSION}-linux-amd64.tar.gz"
          soci --version

      - name: Generate and push SOCI index
        if: ${{ !inputs.skip-soci }}
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          echo "Creating SOCI index for: ${IMAGE}"

          # Ensure containerd is running (pre-installed on ubuntu runners)
          sudo systemctl restart containerd
          sudo systemctl is-active containerd

          # Get ECR credentials for containerd
          ECR_PASSWORD=$(aws ecr get-login-password --region "${AWS_REGION}")

          # Pull image into containerd store
          echo "Pulling image into containerd store..."
          sudo ctr images pull --user "AWS:${ECR_PASSWORD}" --platform linux/arm64 "${IMAGE}"

          # Create SOCI index
          echo "Creating SOCI index..."
          sudo soci create "${IMAGE}"

          # Push SOCI index to ECR
          echo "Pushing SOCI index to ECR..."
          sudo soci push --user "AWS:${ECR_PASSWORD}" "${IMAGE}"

          echo "SOCI index pushed successfully."
